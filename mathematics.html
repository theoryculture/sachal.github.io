<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mathematics | Sachal Abdullah</title>
    <link rel="stylesheet" href="/sachal.github.io/assets/main.css">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
        }

        .nav-header {
            padding: 20px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .back-link {
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #ff6b6b;
        }

        .hero {
            padding: 80px 20px 40px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            color: #ffffff;
        }

        .tagline {
            color: #888;
            font-size: 1.1rem;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* Adjusting the grid and cards for title-only buttons */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 40px 20px; /* Increased vertical padding for better button feel */
            text-align: center;
            text-decoration: none;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #ff6b6b;
        }

        .card h2 {
            margin: 0;
            color: #ffffff;
            font-size: 1.5rem;
        }
    </style>
</head>

<body>

<header class="nav-header">
    <a href="index.html" class="back-link">← Return Home</a>
</header>

<div class="hero">
    <h1>Mathematics</h1>
    <p class="tagline">Writings, Notes, and Lectures</p>
</div>

<div class="grid">

    <a href="/sachal.github.io/graph-theory" class="card">
        <h2>Graph Theory</h2>
    </a>

    <a href="/sachal.github.io/linear-algebra" class="card">
        <h2>Linear Algebra</h2>
    </a>

</div>

</body>
</html>
