<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Research | Sachal Abdullah</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; color: #333; }
        .hero, .content { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        .graph-container {
            display: flex;
            justify-content: center;
            margin: 60px 0;
        }

        .graph-container svg {
            width: 500px;
            height: 500px;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));
            overflow: visible;
        }

        /* Base Edge styling */
        .base-edge { 
            fill: none; 
            stroke: #bbbbbb; 
            stroke-width: 2.5; 
            stroke-linejoin: round; 
            stroke-linecap: round;
            stroke-dasharray: 1;
            stroke-dashoffset: 1;
            animation: drawEdges 3s ease-out forwards;
        }

        /* Vertex styling */
        circle { 
            fill: #ff6b6b; 
            stroke: #121212; 
            stroke-width: 2; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            opacity: 0;
            transform: scale(0.5);
            transform-origin: center;
            /* Vertices pop in after edges start drawing */
            animation: popIn 0.5s ease forwards;
            animation-delay: 2.5s;
        }

        circle:hover { 
            fill: #3498db; 
            r: 8; 
        }

        /* ===== HAMILTONIAN CYCLE ===== */
        .cycle {
            stroke: #ff3b3b;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            stroke-dasharray: 1;
            stroke-dashoffset: 1;
            /* Starts after the graph is built */
            animation: drawCycle 6s linear forwards;
            animation-delay: 4s;
        }

        /* ===== KEYFRAMES ===== */
        @keyframes drawEdges {
            to { stroke-dashoffset: 0; }
        }

        @keyframes drawCycle {
            to { stroke-dashoffset: 0; }
        }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

</div>
