<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#ccc;font-family:'JetBrains Mono',monospace;font-size:13px}
.tabs{display:flex;gap:2px;padding:12px 12px 0;overflow-x:auto;flex-wrap:wrap;background:#111}
.tab{padding:8px 16px;background:#1a1a1a;border:1px solid #2a2a2a;cursor:pointer;color:#666;font-size:11px;letter-spacing:.05em;white-space:nowrap;transition:all .15s}
.tab:hover{color:#ccc}
.tab.on{background:#1e1e1e;border-bottom-color:#1e1e1e;color:#9b59ff}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#1e1e1e;border-bottom:1px solid #2a2a2a}
.filename{color:#9b59ff;font-size:11px}
.copy-btn{padding:5px 14px;background:none;border:1px solid #333;color:#666;font-family:inherit;font-size:11px;cursor:pointer;transition:all .15s}
.copy-btn:hover{border-color:#9b59ff;color:#9b59ff}
.copy-btn.ok{border-color:#4caf50;color:#4caf50}
.pane{display:none;padding:20px;overflow:auto;height:calc(100vh - 90px)}
.pane.on{display:block}
pre{white-space:pre;line-height:1.6;color:#abb2bf;font-size:12px}
/* syntax tint */
.t-tag{color:#e06c75}
.t-attr{color:#d19a66}
.t-str{color:#98c379}
.t-com{color:#5c6370;font-style:italic}
</style>
</head>
<body>
<div class="tabs" id="tabs"></div>
<div class="toolbar"><span class="filename" id="fname"></span><button class="copy-btn" id="copyBtn" onclick="copyFile()">Copy file</button></div>
<div id="panes"></div>
